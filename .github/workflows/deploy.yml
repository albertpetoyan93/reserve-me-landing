name: Deploy Next.js to Private Server

on:
  push:
    branches:
      - main  # Runs whenever you push code to the main branch

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code Base
        uses: actions/checkout@v4

      - name: Setup Node.js Runtime
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Build Next.js Production App
        run: npm run build
        env:
          # If your app needs API keys during the build process, add them here:
          NEXT_PUBLIC_API_URL: "https://reserveme.com/api" 

      - name: Deploy Production Files via SFTP
        uses: easingthemes/ssh-deploy@v5.1.0
        with:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          ARGS: "-rlgoDzlk --delete" # Rsync flags to cleanly sync and delete old files
          REMOTE_HOST: ${{ secrets.VPS_HOST }}
          REMOTE_USER: ${{ secrets.VPS_USER }}
          PORT: ${{ secrets.VPS_PORT || 22 }}
          # Exclude source code files you don't need running on production
          EXCLUDE: "/node_modules/, /src/, /.git/, /README.md", /.github/"
          TARGET: "/var/www/reserve-me-landing" # The absolute path to your folder on your server

      - name: Restart Server Process via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT || 22 }}
          script: |
            cd /var/www/reserve-me-landing
            # Install production-only dependencies directly on the server
            npm install --production
            
            # Restart the app using PM2 so it runs seamlessly in the background
            pm2 restart reserve-me-landing || pm2 start npm --name "reserve-me-landing" -- start
