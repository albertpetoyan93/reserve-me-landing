name: Deploy Next.js to Private Server

on:
  push:
    branches:
      - main # Runs whenever you push code to the main branch

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code Base
        uses: actions/checkout@v4

      - name: Setup Node.js Runtime
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"

      - name: Install Dependencies
        run: npm ci

      - name: Build Next.js Production App
        run: npm run build
        env:
          NEXT_PUBLIC_API_URL: "https://reserveme.me"

      - name: Deploy Production Files via SFTP
        uses: easingthemes/ssh-deploy@v5.1.0
        with:
          SSH_PRIVATE_KEY: ${{ secrets.VPS_KEY }}
          ARGS: "-rlgoDzlk --delete"
          REMOTE_HOST: ${{ secrets.VPS_HOST }}
          REMOTE_USER: ${{ secrets.VPS_USER }}
          PORT: ${{ secrets.VPS_PORT || 22 }}
          EXCLUDE: "/node_modules/, /src/, /.git/, /README.md, /.github/"
          TARGET: "/var/www/reserve-me-landing"

      - name: Restart Server Process via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_KEY }}
          port: ${{ secrets.VPS_PORT || 22 }}
          script: |
            cd /var/www/reserve-me-landing
            npm install --production
            pm2 restart reserve-me-landing || pm2 start npm --name "reserve-me-landing" -- start -- --port 3000
